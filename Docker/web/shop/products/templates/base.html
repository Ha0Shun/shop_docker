    <script>
        function getAjax(url, msg, reload) {
            $.get(url, function (data, status) {
                Swal.fire({
                    icon: 'success',
                    title: msg,
                    showConfirmButton: false,
                    timer: 1500
                }).then((result) => {
                    if (reload == 'true') {
                        location.reload()
                    }
                })
            });
        }
        document.addEventListener('DOMContentLoaded', function() {
            // 處理所有價格元素（每個商品的價格和總金額）
            const priceElements = document.querySelectorAll('.product-price, #total-price'); 
    
            priceElements.forEach(function(priceElement) {
                let priceText = priceElement.innerText.trim();
    
                // 只處理價格部分，確保不影響商品數量（如1 x $2311）
                let priceMatch = priceText.match(/\$(\d+(\.\d+)?)/);
    
                if (priceMatch) {
                    // 解析價格並去除小數點
                    let price = parseFloat(priceMatch[0].replace('$', '').trim());  // 取得價格並轉換為浮動數字
                    price = Math.floor(price);  // 向下取整
    
                    // 用更新過的價格替換原來的價格部分，保持其他文本（如數量）不變
                    priceText = priceText.replace(priceMatch[0], `$${price}`);
                    priceElement.innerText = priceText;  // 更新價格顯示
                }
            });
        });
        document.addEventListener('DOMContentLoaded', function() {
            // 處理包含總價格的元素
            const priceElements = document.querySelectorAll('.product-total'); 
    
            priceElements.forEach(function(priceElement) {
                // 取得價格文本（例如：$1611.0）
                let priceText = priceElement.innerText;
    
                // 找到 "$" 之後的價格部分
                let priceMatch = priceText.match(/\$(\d+(\.\d+)?)/);
    
                if (priceMatch) {
                    // 解析價格並去除小數點
                    let price = parseFloat(priceMatch[0].replace('$', '').trim());  // 取得價格並轉換為浮動數字
                    price = Math.floor(price);  // 向下取整
    
                    // 將更新後的價格重新插入原來的位置
                    priceText = priceText.replace(priceMatch[0], `$${price}`);
                    priceElement.innerText = priceText;
                }
            });
        });
        
    </script>
